name: Build & Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore ${{ github.workspace }}/ytune-release.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias ytune \
            -storepass ytune2026 \
            -keypass ytune2026 \
            -dname "CN=YTune, OU=YTune, O=YTune, L=Dubai, ST=Dubai, C=AE"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/ytune-release.keystore
          KEYSTORE_PASSWORD: ytune2026
          KEY_ALIAS: ytune
          KEY_PASSWORD: ytune2026
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-universal-release.apk release/YTune-${{ github.ref_name || 'latest' }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/*.apk release/YTune-${{ github.ref_name || 'latest' }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTune-release
          path: release/*.apk

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
